<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Song Code</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="shapes-container" id="shapes"></div>

    <div class="pleaseClick" id="card">
        <div class="click-header" id="clickText">Please click here 🎈</div>
        
        <div class="lyrics-box">
            <div class="lyrics-track" id="track">
                <p>Happy Birthday To You</p>
                <p>Happy Birthday To my Friend</p>
                <p>Happy Birthday to my best sister</p>
                <p>Happy Birthday To me </p>
                <p>Happy Birthday To Github</p>
                <p>Happy Birthday To my mom</p>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
    </div>

    <audio id="birthdayMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <script src="script.js"></script>
</body>
</html>
